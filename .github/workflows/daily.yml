name: Daily Notice Tracker

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Chrome 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: 의존성 설치
        run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: seen_posts.json
          key: seen-posts-${{ github.run_id }}
          restore-keys: seen-posts-
      - name: 크롤러 실행
        env:
          KAKAO_TOKEN: ${{ secrets.KAKAO_TOKEN }}
          KAKAO_TOKEN_2: ${{ secrets.KAKAO_TOKEN_2 }}
          KAKAO_TOKEN_3: ${{ secrets.KAKAO_TOKEN_3 }}
        run: python crawler.py
      - name: 결과 커밋
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_posts.json || true
          git diff --staged --quiet || git commit -m "Update seen posts [$(date +'%Y-%m-%d')]"
          git push || true
